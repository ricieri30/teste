server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  gzip on;
  gzip_types text/plain text/css text/javascript application/json;
  location ~* \.(jpg|jpeg|png|gif|css|js|svg)$ { expires 1y; }
  location / { try_files $uri $uri/ /index.html; }
  location /api { proxy_pass http://vps-guardian-backend:3000; proxy_set_header Host $host; }
}
